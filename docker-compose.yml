version: '3.1'

services:
  db:
    image: mysql:8.0
    restart: "no"
    environment:
      MYSQL_ROOT_PASSWORD: ROOT
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    restart: "no"
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
    depends_on:
      - db
  php:
    build: .
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www/html
volumes:
  db_data:
